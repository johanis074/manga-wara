controllers:
    resource:
        path: ../src/Controller/
        namespace: App\Controller
    type: attribute
books_show:
    path: /books/{id}
    controller: App\Controller\BookController::books_show
# config/routes.yaml
cart_add:
    path: /cart/add/{type}/{id}
    controller: App\Controller\CartController::add

cart_remove:
    path: /cart/remove/{type}/{id}
    controller: App\Controller\CartController::remove

cart_index:
    path: /cart
    controller: App\Controller\CartController::index

app_search:
    path: /search
    controller: App\Controller\SearchController::search

